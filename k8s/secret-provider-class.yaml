# Azure Key Vault CSI SecretProviderClass
# Mounts Key Vault secrets as Kubernetes secrets inside AKS pods.
# Requires the Key Vault CSI driver addon (enabled in Terraform via key_vault_secrets_provider).
#
# Replace <TENANT_ID> and <KEYVAULT_NAME> with your actual values
# or inject them at deploy time via envsubst in the pipeline.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kv-secrets
  namespace: default
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    keyvaultName: "sahar-kv-pfe"
    tenantId: "604f1a96-cbe8-43f8-abbf-f8eaf5d85730"
    objects: |
      array:
        - |
          objectName: acr-password
          objectType: secret
          objectVersion: ""
  # Sync to a native Kubernetes secret so it can be used as envFrom
  secretObjects:
    - secretName: acr-credentials
      type: Opaque
      data:
        - objectName: acr-password
          key: password
