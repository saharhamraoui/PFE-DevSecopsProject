global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  # Scrape Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape the application (adjust target to app's metrics endpoint)
  - job_name: app
    static_configs:
      - targets: ["host.docker.internal:80"]
    metrics_path: /metrics
