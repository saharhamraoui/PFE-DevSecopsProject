name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}
  APP_URL: https://my-app-lpqw42tata-uc.a.run.app

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm test

  sonarqube:
    name: SonarQube Analysis
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run SonarQube Scanner
        run: |
          mkdir -p $HOME/.sonar/cache
          docker run --rm \
            --network=host \
            -v "$(pwd):/usr/src" \
            -v "$HOME/.sonar/cache:/opt/sonar-scanner/.sonar/cache" \
            -e SONAR_SCANNER_OPTS="-Xmx512m" \
            sonarsource/sonar-scanner-cli \
            -Dsonar.projectKey=4you-github \
            -Dsonar.sources=. \
            -Dsonar.exclusions="node_modules/**,dist/**,**/*.test.ts,**/*.html,src/contexts/**" \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm audit --audit-level=critical

  owasp:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: '4you-github'
          path: '.'
          format: 'HTML'
          args: >
            --enableRetired
            --exclude "**/node_modules/**"
            --failOnCVSS 7
            --suppression owasp-suppressions.xml

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: reports/dependency-check-report.html
          retention-days: 30

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test, security, owasp]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build Docker image (local)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            us-central1-docker.pkg.dev/sahar-pfe/my-repo/my-app:${{ github.sha }}
            us-central1-docker.pkg.dev/sahar-pfe/my-repo/my-app:latest

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: us-central1-docker.pkg.dev/sahar-pfe/my-repo/my-app:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Push Docker image to Artifact Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          tags: |
            us-central1-docker.pkg.dev/sahar-pfe/my-repo/my-app:${{ github.sha }}
            us-central1-docker.pkg.dev/sahar-pfe/my-repo/my-app:latest

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: zap-scan
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # 1️⃣ Authenticate to GCP via Workload Identity Federation
      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      # 2️⃣ Set up Google Cloud SDK
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 3️⃣ Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy my-app \
            --image us-central1-docker.pkg.dev/sahar-pfe/my-repo/my-app:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --service-account 94773365692-compute@developer.gserviceaccount.com

  # ────────────────────────────────────────────────────────────────────────
  # Staging — deploy to Cloud Run staging for ZAP scan before production
  # ────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Cloud Run (Staging)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (Staging)
        id: deploy
        run: |
          gcloud run deploy my-app-staging \
            --image us-central1-docker.pkg.dev/sahar-pfe/my-repo/my-app:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --service-account 94773365692-compute@developer.gserviceaccount.com
          URL=$(gcloud run services describe my-app-staging \
            --platform managed --region us-central1 \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

  # ────────────────────────────────────────────────────────────────────────
  # Grafana — build, push, and deploy to Cloud Run
  # ────────────────────────────────────────────────────────────────────────
  build-push-grafana:
    name: Build & Push Grafana Image
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push Grafana image
        uses: docker/build-push-action@v5
        with:
          context: grafana
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            us-central1-docker.pkg.dev/sahar-pfe/my-repo/grafana:${{ github.sha }}
            us-central1-docker.pkg.dev/sahar-pfe/my-repo/grafana:latest

  deploy-grafana:
    name: Deploy Grafana to Cloud Run
    runs-on: ubuntu-latest
    needs: build-push-grafana
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Grafana to Cloud Run
        run: |
          gcloud run deploy grafana \
            --image us-central1-docker.pkg.dev/sahar-pfe/my-repo/grafana:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --port 3000 \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 1 \
            --service-account grafana-cloud-run@sahar-pfe.iam.gserviceaccount.com \
            --update-secrets GF_SECURITY_ADMIN_PASSWORD=grafana-admin-password:latest \
            --set-env-vars GF_AUTH_ANONYMOUS_ENABLED=true,GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer

  # ────────────────────────────────────────────────────────────────────────
  # OWASP ZAP — Dynamic Application Security Testing (DAST)
  # Scans the RUNNING app for vulnerabilities (XSS, SQLi, CSRF, etc.)
  # ────────────────────────────────────────────────────────────────────────
  zap-scan:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: deploy-staging
    timeout-minutes: 30
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP ZAP Baseline Scan (Staging)
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ needs.deploy-staging.outputs.url }}
          fail_action: false

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────
  # AKS — Build, push to ACR, then update GitOps repo (ArgoCD picks it up)
  # ────────────────────────────────────────────────────────────────────────
  build-push-acr:
    name: Build & Push to Azure ACR
    runs-on: ubuntu-latest
    needs: [lint, test, security, owasp]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: saharacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push to ACR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            saharacr.azurecr.io/my-app:${{ github.sha }}
            saharacr.azurecr.io/my-app:latest

  update-gitops:
    name: Update GitOps Repo (ArgoCD)
    runs-on: ubuntu-latest
    needs: build-push-acr
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: saharhamraoui/PFE-GitOps
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tag in deployment.yaml
        run: |
          sed -i "s|saharacr.azurecr.io/my-app:.*|saharacr.azurecr.io/my-app:${{ github.sha }}|" \
            gitops/k8s/deployment.yaml

      - name: Commit and push to GitOps repo
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update my-app image to ${{ github.sha }}" || echo "No changes"
          git push