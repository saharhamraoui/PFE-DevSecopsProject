name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ACR_REGISTRY: saharacr.azurecr.io
  APP_IMAGE: saharacr.azurecr.io/my-app

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm test

  sonarqube:
    name: SonarQube Analysis
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run SonarQube Scanner
        run: |
          mkdir -p $HOME/.sonar/cache
          docker run --rm \
            --network=host \
            -v "$(pwd):/usr/src" \
            -v "$HOME/.sonar/cache:/opt/sonar-scanner/.sonar/cache" \
            -e SONAR_SCANNER_OPTS="-Xmx512m" \
            sonarsource/sonar-scanner-cli \
            -Dsonar.projectKey=4you-github \
            -Dsonar.sources=. \
            -Dsonar.exclusions="node_modules/**,dist/**,**/*.test.ts,**/*.html,src/contexts/**" \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=false

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm audit --audit-level=critical

  owasp:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: '4you-github'
          path: '.'
          format: 'HTML'
          args: >
            --enableRetired
            --exclude "**/node_modules/**"
            --failOnCVSS 7
            --suppression owasp-suppressions.xml

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: reports/dependency-check-report.html
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────
  # Build Docker image, scan with Trivy, push to Azure Container Registry
  # ────────────────────────────────────────────────────────────────────────
  build-push-acr:
    name: Build, Scan & Push to Azure ACR
    runs-on: ubuntu-latest
    needs: [lint, test, security, owasp]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image (local, for scanning)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.APP_IMAGE }}:${{ github.sha }}
            ${{ env.APP_IMAGE }}:latest

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.APP_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Push image to ACR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          tags: |
            ${{ env.APP_IMAGE }}:${{ github.sha }}
            ${{ env.APP_IMAGE }}:latest

  # ────────────────────────────────────────────────────────────────────────
  # Update the GitOps repo — ArgoCD detects the change and syncs to AKS
  # ────────────────────────────────────────────────────────────────────────
  update-gitops:
    name: Update GitOps Repo (ArgoCD -> AKS)
    runs-on: ubuntu-latest
    needs: build-push-acr
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: saharhamraoui/PFE-GitOps
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tag in deployment.yaml
        run: |
          sed -i "s|${{ env.APP_IMAGE }}:.*|${{ env.APP_IMAGE }}:${{ github.sha }}|" \
            gitops/k8s/deployment.yaml

      - name: Commit and push to GitOps repo
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update my-app image to ${{ github.sha }}" || echo "No changes"
          git push

  # ────────────────────────────────────────────────────────────────────────
  # OWASP ZAP — DAST scan against the running app on AKS
  # Set AKS_APP_URL variable to your AKS ingress external IP / hostname
  # ────────────────────────────────────────────────────────────────────────
  zap-scan:
    name: OWASP ZAP Scan (AKS)
    runs-on: ubuntu-latest
    needs: update-gitops
    timeout-minutes: 30
    permissions:
      issues: write
    if: |
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch') &&
      vars.AKS_APP_URL != ''
    steps:
      - uses: actions/checkout@v4

      - name: Wait for ArgoCD sync
        run: sleep 60

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ vars.AKS_APP_URL }}
          fail_action: false

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
          retention-days: 30
